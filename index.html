<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Quiz - Grile Examene</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--card:#12122a;--card2:#1a1a3a;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--text:#e8e8f0;--text2:#9898b8;--border:#2a2a4a}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:20px}
h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2),#fd79a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;padding:30px 0 10px}
.subtitle{text-align:center;color:var(--text2);margin-bottom:30px;font-size:.95rem}
.stats-bar{display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 20px;text-align:center}
.stat-val{font-size:1.4rem;font-weight:700;color:var(--accent2)}
.stat-label{font-size:.75rem;color:var(--text2);margin-top:2px}
.course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;margin-bottom:30px}
.course-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all .3s ease;position:relative;overflow:hidden}
.course-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 30px rgba(108,92,231,.2)}
.course-card.active{border-color:var(--accent);box-shadow:0 0 20px rgba(108,92,231,.3)}
.course-num{font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.course-title{font-size:.9rem;font-weight:600;line-height:1.3;margin-bottom:8px}
.course-count{font-size:.75rem;color:var(--text2)}
.course-progress{height:3px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden}
.course-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .5s ease}
.quiz-area{display:none}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.quiz-title{font-size:1.1rem;font-weight:700}
.quiz-counter{color:var(--text2);font-size:.85rem}
.btn{padding:10px 22px;border-radius:10px;border:none;font-family:inherit;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b7cf7);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(108,92,231,.4)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--accent);color:var(--text)}
.btn-back{background:transparent;border:1px solid var(--border);color:var(--text2);margin-right:auto}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:25px;margin-bottom:20px;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-number{font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.q-text{font-size:1.05rem;font-weight:600;line-height:1.5;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.option{padding:14px 18px;background:var(--card2);border:2px solid var(--border);border-radius:12px;cursor:pointer;transition:all .25s;font-size:.9rem;line-height:1.4}
.option:hover:not(.disabled){border-color:var(--accent);background:rgba(108,92,231,.08)}
.option.selected{border-color:var(--accent);background:rgba(108,92,231,.15)}
.option.correct{border-color:var(--green);background:rgba(0,184,148,.12);color:var(--green)}
.option.wrong{border-color:var(--red);background:rgba(225,112,85,.12);color:var(--red)}
.option.disabled{cursor:default;opacity:.7}
.option.correct.disabled{opacity:1}
.explanation{margin-top:15px;padding:15px;background:rgba(0,184,148,.08);border:1px solid rgba(0,184,148,.2);border-radius:12px;font-size:.85rem;line-height:1.5;color:var(--green);display:none}
.explanation.show{display:block;animation:fadeIn .3s ease}
.nav-buttons{display:flex;gap:10px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.progress-bar{height:5px;background:var(--border);border-radius:5px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .5s ease;border-radius:5px}
.results{text-align:center;padding:40px 20px}
.results-score{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
.results-text{color:var(--text2);font-size:1rem;margin-bottom:30px}
.mode-toggle{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.mode-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:.8rem;cursor:pointer;transition:all .2s}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.all-btn{display:block;margin:0 auto 30px;padding:14px 32px;font-size:1rem}
@media(max-width:600px){h1{font-size:1.4rem}.course-grid{grid-template-columns:1fr}.q-text{font-size:.95rem}}
</style>
</head>
<body>
<div class="container">
<h1>Marketing Quiz</h1>
<p class="subtitle">Grile pentru examen - Prof. Hudea Oana Simona</p>
<div id="home">
<div class="stats-bar">
<div class="stat"><div class="stat-val" id="totalQ">0</div><div class="stat-label">Întrebări</div></div>
<div class="stat"><div class="stat-val" id="totalC">13</div><div class="stat-label">Cursuri</div></div>
<div class="stat"><div class="stat-val" id="totalCorrect">0</div><div class="stat-label">Corecte</div></div>
<div class="stat"><div class="stat-val" id="totalWrong">0</div><div class="stat-label">Greșite</div></div>
</div>
<button class="btn btn-primary all-btn" onclick="startAll()">Simulare Examen (toate cursurile)</button>
<div class="course-grid" id="courseGrid"></div>
</div>
<div class="quiz-area" id="quizArea">
<div class="quiz-header">
<button class="btn btn-back" onclick="goHome()">← Înapoi</button>
<span class="quiz-title" id="quizTitle"></span>
<span class="quiz-counter" id="quizCounter"></span>
</div>
<div class="mode-toggle">
<button class="mode-btn active" onclick="setMode('learn')" id="modeLearn">Mod Învățare</button>
<button class="mode-btn" onclick="setMode('exam')" id="modeExam">Mod Examen</button>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="questionContainer"></div>
<div class="nav-buttons" id="navButtons">
<button class="btn btn-outline" onclick="prevQ()">← Anterioară</button>
<button class="btn btn-primary" onclick="nextQ()">Următoarea →</button>
</div>
<div class="results" id="results" style="display:none">
<div class="results-score" id="scoreText"></div>
<div class="results-text" id="scoreDetail"></div>
<button class="btn btn-primary" onclick="retry()" style="margin-right:10px">Reia Testul</button>
<button class="btn btn-outline" onclick="goHome()">Alege alt curs</button>
</div>
</div>
</div>
<script>
const COURSES = {
  "1": {
    "name": "Piața și spațiul competitiv - Partea I",
    "questions": [
      {
        "id": "c1_q1",
        "question": "Ce reprezintă piața conform concepției marketingului?",
        "options": [
          "A) Locul fizic unde se vând produsele",
          "B) Clienții potențiali sau efectivi ai unui produs sau ansamblu de produse",
          "C) Ansamblul furnizorilor unei companii",
          "D) Totalitatea magazinelor dintr-o zonă geografică"
        ],
        "correct": "B",
        "explanation": "Conform concepției marketingului, piața este reprezentată de clienții potențiali sau efectivi ai unui produs sau ansamblu de produse al/ale unei organizații."
      },
      {
        "id": "c1_q2",
        "question": "Piața disponibilă constă în:",
        "options": [
          "A) Toți consumatorii posibili ai unui produs",
          "B) Toți consumatorii care au achiziționat deja produsul",
          "C) Toți consumatorii posibili ai unui produs care dispun și de venitul necesar pentru a-l achiziționa",
          "D) Segmentul de consumatori căruia producătorul le adresează oferta"
        ],
        "correct": "C",
        "explanation": "Piața disponibilă constă în toți consumatorii posibili ai unui produs, care dispun și de venitul necesar, permițându-și, astfel, să-l achiziționeze."
      },
      {
        "id": "c1_q3",
        "question": "Care este diferența dintre piața disponibilă calificată și piața disponibilă?",
        "options": [
          "A) Piața disponibilă calificată include și consumatorii fără venit",
          "B) Piața disponibilă calificată include consumatorii care dispun de venit și sunt efectiv interesați de achiziție",
          "C) Nu există nicio diferență",
          "D) Piața disponibilă calificată exclude consumatorii cu venit mare"
        ],
        "correct": "B",
        "explanation": "Piața disponibilă calificată constă în toți consumatorii posibili ai unui produs care dispun de venitul necesar ȘI care sunt efectiv interesați în a-l achiziționa."
      },
      {
        "id": "c1_q4",
        "question": "Piața efectivă constă în:",
        "options": [
          "A) Toți consumatorii posibili ai unui produs",
          "B) Consumatorii cărora producătorul le adresează oferta",
          "C) Toți consumatorii care au achiziționat produsul",
          "D) Consumatorii care dispun de venitul necesar"
        ],
        "correct": "C",
        "explanation": "Piața efectivă constă în toți consumatorii care au achiziționat produsul."
      },
      {
        "id": "c1_q5",
        "question": "Care sunt elementele specifice ale pieței?",
        "options": [
          "A) Cererea, oferta, concurența și prețul",
          "B) Produsul, prețul, plasarea și promovarea",
          "C) Consumatorii, producătorii și distribuitorii",
          "D) Importul, exportul și producția internă"
        ],
        "correct": "A",
        "explanation": "Piața este rezultatul acțiunii elementelor sale specifice: cererea, oferta, concurența și prețul."
      },
      {
        "id": "c1_q6",
        "question": "Ce strategie se aplică în cazul cererii negative?",
        "options": [
          "A) Strategie de stimulare",
          "B) Strategie de conversie",
          "C) Strategie de dezvoltare",
          "D) Strategie de remarketing"
        ],
        "correct": "B",
        "explanation": "Cererea negativă – clienții manifestă respingere față de un produs, aceasta impunând demistificarea cererii – strategie de conversie."
      },
      {
        "id": "c1_q7",
        "question": "Strategia de stimulare se aplică în cazul:",
        "options": [
          "A) Cererii negative",
          "B) Cererii latente",
          "C) Lipsei cererii",
          "D) Cererii excesive"
        ],
        "correct": "C",
        "explanation": "Lipsa cererii – clienții manifestă indiferență față de un produs, nefiindu-le cunoscut, aceasta impunând crearea cererii – strategie de stimulare."
      },
      {
        "id": "c1_q8",
        "question": "Ce strategie se aplică în cazul cererii latente?",
        "options": [
          "A) Strategie de conversie",
          "B) Strategie de menținere",
          "C) Strategie de dezvoltare",
          "D) Strategie de sincromarketing"
        ],
        "correct": "C",
        "explanation": "Cererea latentă – clienții nu sunt pe deplin satisfăcuți de produsul existent, aceasta impunând consolidarea cererii prin furnizarea de produse noi – strategie de dezvoltare."
      },
      {
        "id": "c1_q9",
        "question": "Strategia de remarketing se aplică în cazul:",
        "options": [
          "A) Cererii deplină",
          "B) Cererii excesive",
          "C) Cererii în scădere",
          "D) Cererii neregulate"
        ],
        "correct": "C",
        "explanation": "Cererea în scădere impune revitalizarea cererii prin resuscitarea interesului – strategie de remarketing."
      },
      {
        "id": "c1_q10",
        "question": "Ce strategie se aplică pentru cererea neregulată (fluctuații sezoniere)?",
        "options": [
          "A) Strategie de demarketing",
          "B) Strategie de antimarketing",
          "C) Strategie de sincromarketing",
          "D) Strategie de menținere"
        ],
        "correct": "C",
        "explanation": "Cererea neregulată impune regularizarea cererii, adică recorelarea producției cu cererea – strategie de sincromarketing."
      },
      {
        "id": "c1_q11",
        "question": "Strategia de demarketing se aplică în cazul:",
        "options": [
          "A) Cererii deplină",
          "B) Cererii excesive",
          "C) Cererii indezirabile",
          "D) Cererii latente"
        ],
        "correct": "B",
        "explanation": "Cererea excesivă – clienții doresc să absoarbă o cantitate mai mare de produs decât cea disponibilă, implicând diminuarea nivelului cererii – strategie de demarketing."
      },
      {
        "id": "c1_q12",
        "question": "Strategia de antimarketing vizează:",
        "options": [
          "A) Menținerea nivelului cererii",
          "B) Crearea cererii pentru un produs nou",
          "C) Distrugerea cererii pentru un produs indezirabil",
          "D) Revitalizarea cererii în scădere"
        ],
        "correct": "C",
        "explanation": "Cererea indezirabilă – atunci când se dorește eliminarea unui produs utilizat la scară mare, din motive sociale sau competitive, implicând distrugerea cererii – strategie de antimarketing."
      },
      {
        "id": "c1_q13",
        "question": "Oferta este influențată de următorii factori, CU EXCEPȚIA:",
        "options": [
          "A) Prețul resurselor",
          "B) Costul de producție",
          "C) Preferințele individuale ale consumatorilor",
          "D) Tehnologia"
        ],
        "correct": "C",
        "explanation": "Oferta este influențată de: prețul resurselor, costul de producție, prețul altor produse, numărul furnizorilor, tehnologia, perspectivele pieței, taxele și subsidiile, condițiile naturale. Preferințele consumatorilor influențează cererea, nu oferta."
      },
      {
        "id": "c1_q14",
        "question": "Piața cumpărătorului apare atunci când:",
        "options": [
          "A) Cererea depășește oferta",
          "B) Oferta depășește cererea",
          "C) Cererea este egală cu oferta",
          "D) Nu există concurență pe piață"
        ],
        "correct": "B",
        "explanation": "Piața cumpărătorului – oferta depășește cererea și, în consecință, cumpărătorul deține controlul în privința termenilor vânzării (abundența pieței)."
      },
      {
        "id": "c1_q15",
        "question": "Piața vânzătorului se caracterizează prin:",
        "options": [
          "A) Oferta depășește cererea",
          "B) Cererea depășește oferta",
          "C) Prețurile sunt foarte scăzute",
          "D) Există mulți concurenți pe piață"
        ],
        "correct": "B",
        "explanation": "Piața vânzătorului – cererea depășește oferta, vânzătorul impunând prețul și alte condiții ale pieței."
      },
      {
        "id": "c1_q16",
        "question": "Piața deservită reprezintă:",
        "options": [
          "A) Toți consumatorii posibili ai unui produs",
          "B) Segmentul pieței disponibile calificate căruia producătorul îi adresează oferta",
          "C) Toți consumatorii care au cumpărat produsul",
          "D) Consumatorii care dispun de venit suficient"
        ],
        "correct": "B",
        "explanation": "Piața deservită constă în toți consumatorii posibili ca parte a pieței disponibile calificate, cărora producătorul le adresează oferta."
      },
      {
        "id": "c1_q17",
        "question": "Cererea deplină impune aplicarea unei strategii de:",
        "options": [
          "A) Conversie",
          "B) Menținere",
          "C) Demarketing",
          "D) Stimulare"
        ],
        "correct": "B",
        "explanation": "Cererea deplină – clienții absorb cantitatea de produs estimată, aceasta implicând menținerea nivelului cererii – strategie de menținere."
      },
      {
        "id": "c1_q18",
        "question": "Capacitatea de producție a companiei reflectă:",
        "options": [
          "A) Oferta potențială",
          "B) Cererea efectivă",
          "C) Piața efectivă",
          "D) Piața potențială"
        ],
        "correct": "A",
        "explanation": "Capacitatea de producție a companiei reflectă oferta potențială, cererea efectivă influențând oferta reală."
      },
      {
        "id": "c1_q19",
        "question": "Piața este descrisă ca mâna invizibilă deoarece:",
        "options": [
          "A) Nu poate fi observată fizic",
          "B) Ghidează activitățile economice dincolo de capacitatea participanților de a exercita influențe individuale decisive",
          "C) Funcționează doar în secret",
          "D) Este controlată de o singură entitate"
        ],
        "correct": "B",
        "explanation": "Piața este descrisă ca mâna invizibilă ce ghidează activitățile economice, forța impersonală ce acționează dincolo de capacitatea participanților de exercitare de influențe individuale decisive."
      },
      {
        "id": "c1_q20",
        "question": "Evoluția cererii este evaluată prin:",
        "options": [
          "A) Măsurarea volumului vânzărilor",
          "B) Măsurarea coeficientului de elasticitate",
          "C) Calcularea profitului net",
          "D) Analiza numărului de concurenți"
        ],
        "correct": "B",
        "explanation": "Pentru orice bun sau serviciu, cererea este reflectată de curba cererii, iar evoluția sa este evaluată prin măsurarea coeficientului său de elasticitate."
      }
    ]
  },
  "2": {
    "name": "Piața și spațiul competitiv - Partea II",
    "questions": [
      {
        "id": "c2_q1",
        "question": "Piața totală sau globală este reprezentată de:",
        "options": [
          "A) Piața unui singur produs",
          "B) Ansamblul relațiilor de vânzare-cumpărare între producători, distribuitori și consumatori",
          "C) Doar piața internă a unei țări",
          "D) Piața produselor de lux"
        ],
        "correct": "B",
        "explanation": "Piața totală sau globală este reprezentată de ansamblul relațiilor de vânzare-cumpărare care se stabilesc între producători, distribuitori și consumatori, privite în interdependența lor."
      },
      {
        "id": "c2_q2",
        "question": "Dacă piața organizației se identifică cu piața produsului, se generează situația de:",
        "options": [
          "A) Oligopol",
          "B) Concurență perfectă",
          "C) Monopol",
          "D) Concurență monopolistică"
        ],
        "correct": "C",
        "explanation": "Piața organizației se identifică cu piața produsului, generând situația de monopol."
      },
      {
        "id": "c2_q3",
        "question": "Situația de oligopol apare atunci când:",
        "options": [
          "A) Piața produsului constă într-o multitudine de piețe organizaționale",
          "B) Piața produsului constă în câteva piețe organizaționale",
          "C) Piața organizației se identifică cu piața produsului",
          "D) Nu există concurență pe piață"
        ],
        "correct": "B",
        "explanation": "Piața produsului constă în câteva piețe organizaționale, generând situația de oligopol."
      },
      {
        "id": "c2_q4",
        "question": "Strategia nediferențiată presupune că firma:",
        "options": [
          "A) Se adresează unui singur segment de piață",
          "B) Se adresează mai multor segmente cu produse specifice",
          "C) Se adresează tuturor segmentelor, piața organizației fiind identică cu piața produsului",
          "D) Nu se adresează niciunui segment"
        ],
        "correct": "C",
        "explanation": "Strategia nediferențiată – firma se adresează tuturor segmentelor, piața organizației fiind identică cu piața produsului."
      },
      {
        "id": "c2_q5",
        "question": "Strategia concentrată se caracterizează prin:",
        "options": [
          "A) Adresarea tuturor segmentelor de piață",
          "B) Adresarea unui singur segment de piață, piața organizației fiind doar o parte a pieței produsului",
          "C) Adresarea mai multor segmente cu produse diferite",
          "D) Renunțarea la orice segmentare"
        ],
        "correct": "B",
        "explanation": "Strategia concentrată – adresată unui anumit segment de piață, piața organizației fiind doar o parte a pieței produsului."
      },
      {
        "id": "c2_q6",
        "question": "Cota de piață se calculează ca:",
        "options": [
          "A) Raport între volumul cererii și volumul ofertei",
          "B) Raport între volumul vânzărilor organizației și volumul total al vânzărilor pe piața de referință",
          "C) Raport între profit și costuri",
          "D) Raport între numărul de clienți și populația totală"

let currentCourse = null;
let currentQuestions = [];
let currentIndex = 0;
let answers = {};
let mode = 'learn';
let globalStats = {correct:0, wrong:0};

function init() {
  const grid = document.getElementById('courseGrid');
  let totalQ = 0;
  for (const [id, course] of Object.entries(COURSES)) {
    totalQ += course.questions.length;
    const card = document.createElement('div');
    card.className = 'course-card';
    card.onclick = () => startCourse(id);
    card.innerHTML = `
      <div class="course-num">Curs ${id}</div>
      <div class="course-title">${course.name}</div>
      <div class="course-count">${course.questions.length} întrebări</div>
      <div class="course-progress"><div class="course-progress-fill" id="prog_${id}" style="width:0%"></div></div>
    `;
    grid.appendChild(card);
  }
  document.getElementById('totalQ').textContent = totalQ;
  loadStats();
}

function loadStats() {
  try {
    const s = JSON.parse(localStorage.getItem('quizStats') || '{}');
    globalStats = {correct: s.correct || 0, wrong: s.wrong || 0};
  } catch(e) {}
  updateGlobalStats();
}

function saveStats() {
  localStorage.setItem('quizStats', JSON.stringify(globalStats));
  updateGlobalStats();
}

function updateGlobalStats() {
  document.getElementById('totalCorrect').textContent = globalStats.correct;
  document.getElementById('totalWrong').textContent = globalStats.wrong;
}

function startCourse(id) {
  currentCourse = id;
  currentQuestions = [...COURSES[id].questions];
  currentIndex = 0;
  answers = {};
  document.getElementById('quizTitle').textContent = COURSES[id].name;
  document.getElementById('home').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('navButtons').style.display = 'flex';
  document.getElementById('questionContainer').style.display = 'block';
  showQuestion();
}

function startAll() {
  currentCourse = 'all';
  currentQuestions = [];
  for (const course of Object.values(COURSES)) {
    currentQuestions.push(...course.questions);
  }
  // Shuffle
  for (let i = currentQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
  }
  currentIndex = 0;
  answers = {};
  document.getElementById('quizTitle').textContent = 'Simulare Examen - Toate Cursurile';
  document.getElementById('home').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  document.getElementById('navButtons').style.display = 'flex';
  document.getElementById('questionContainer').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  if (currentIndex >= currentQuestions.length) { showResults(); return; }
  const q = currentQuestions[currentIndex];
  const answered = answers[q.id];
  const total = currentQuestions.length;
  document.getElementById('quizCounter').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('progressFill').style.width = `${((currentIndex + 1) / total) * 100}%`;
  
  let optionsHTML = q.options.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    let cls = 'option';
    if (answered) {
      cls += ' disabled';
      if (letter === q.correct) cls += ' correct';
      else if (letter === answered) cls += ' wrong';
    }
    return `<div class="${cls}" onclick="selectOption('${q.id}','${letter}',${i})" data-letter="${letter}">${opt}</div>`;
  }).join('');

  let explHTML = `<div class="explanation ${answered && mode === 'learn' ? 'show' : ''}">${q.explanation || ''}</div>`;

  document.getElementById('questionContainer').innerHTML = `
    <div class="question-card">
      <div class="q-number">Întrebarea ${currentIndex + 1} din ${total}</div>
      <div class="q-text">${q.question}</div>
      <div class="options">${optionsHTML}</div>
      ${explHTML}
    </div>
  `;
}

function selectOption(qId, letter, idx) {
  if (answers[qId]) return;
  const q = currentQuestions.find(qq => qq.id === qId);
  answers[qId] = letter;
  const isCorrect = letter === q.correct;
  
  if (isCorrect) globalStats.correct++;
  else globalStats.wrong++;
  saveStats();

  if (mode === 'learn') {
    showQuestion();
  } else {
    // Exam mode - just mark selected, don't reveal
    const options = document.querySelectorAll('.option');
    options.forEach(o => {
      o.classList.add('disabled');
      if (o.dataset.letter === letter) o.classList.add('selected');
    });
  }
}

function nextQ() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    showQuestion();
  } else {
    showResults();
  }
}

function prevQ() {
  if (currentIndex > 0) {
    currentIndex--;
    showQuestion();
  }
}

function showResults() {
  let correct = 0, total = currentQuestions.length;
  currentQuestions.forEach(q => { if (answers[q.id] === q.correct) correct++; });
  const pct = Math.round((correct / total) * 100);
  
  document.getElementById('questionContainer').style.display = 'none';
  document.getElementById('navButtons').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  document.getElementById('scoreText').textContent = `${correct} / ${total} (${pct}%)`;
  
  let msg = pct >= 90 ? 'Excelent! Ești pregătit/ă pentru examen!' :
            pct >= 70 ? 'Bine! Mai repetă puțin!' :
            pct >= 50 ? 'Poți mai bine. Recitește cursurile!' : 'Trebuie să mai studiezi. Nu renunța!';
  document.getElementById('scoreDetail').textContent = msg;
}

function retry() {
  currentIndex = 0;
  answers = {};
  document.getElementById('results').style.display = 'none';
  document.getElementById('navButtons').style.display = 'flex';
  document.getElementById('questionContainer').style.display = 'block';
  if (currentCourse === 'all') {
    for (let i = currentQuestions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
    }
  }
  showQuestion();
}

function goHome() {
  document.getElementById('home').style.display = 'block';
  document.getElementById('quizArea').style.display = 'none';
}

function setMode(m) {
  mode = m;
  document.getElementById('modeLearn').classList.toggle('active', m === 'learn');
  document.getElementById('modeExam').classList.toggle('active', m === 'exam');
}

init();
</script>
